[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries for the project
lib_deps = 
    bodmer/TFT_eSPI@^2.5.33
    
; Build flags for optimized performance
build_flags = 
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=135
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_MOSI=19
    -DTFT_CLK=18
    -DTFT_MISO=38
    -DTFT_BCKL=4
    -DLOAD_GLFF=1
    -DSMOOTH_FONT=1
