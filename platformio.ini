[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries for the project
lib_deps = 
    bodmer/TFT_eSPI@^2.5.33
    
; Build flags for TTGO T-Display (ST7735S driver, 1.14" display, 135x240 native)
build_flags = 
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_MOSI=19
    -DTFT_CLK=18
    -DTFT_MISO=38
    -DLOAD_GLFF=1
    -DSMOOTH_FONT=1
